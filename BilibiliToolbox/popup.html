<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&#31449;&#24037;&#20855;&#31665;</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #fb7299, #fa6598);
            color: #fff;
            padding: 16px;
            text-align: center;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }
        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .content {
            padding: 12px;
        }
        .section {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .section-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .user-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .user-item:hover {
            background: #f5f5f5;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-name {
            font-size: 13px;
            color: #333;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-actions {
            display: flex;
            gap: 4px;
        }
        .user-link {
            padding: 3px 8px;
            font-size: 11px;
            color: #fb7299;
            text-decoration: none;
            border: 1px solid #fb7299;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .user-link:hover {
            background: #fb7299;
            color: #fff;
        }
        .delete-btn {
            padding: 3px 6px;
            font-size: 11px;
            color: #999;
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #ff4757;
            color: #fff;
            border-color: #ff4757;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 20px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #fb7299;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #fa6598;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>B&#31449;&#24037;&#20855;&#31665;</h1>
        <p>&#28459;&#30011;&#38405;&#35835;&#19982;&#24555;&#25463;&#25910;&#34255;</p>
    </div>
    <div class="content">
        <div class="section">
            <div class="section-title">&#25910;&#34255;&#21015;&#34920;</div>
            <div class="user-list" id="userList">
                <div class="empty-tip">&#26242;&#26080;&#25910;&#34255;</div>
            </div>
        </div>
        <button type="button" class="btn" id="addCurrentBtn">+ &#28155;&#21152;&#24403;&#21069;&#39029;&#38754;&#29992;&#25143;</button>
    </div>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
